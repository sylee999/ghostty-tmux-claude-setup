# ==============================================================================
# Ghostty + tmux + Claude Code 호환성 설정 스니펫
# 기존 ~/.tmux.conf 에 append 하여 사용.
# ==============================================================================

# --- [필수] Shift+Enter / extended keys ---
set -s extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'

# --- [필수] Ghostty 알림 / OSC 통과 ---
set -g allow-passthrough on
set -as terminal-features ',xterm-ghostty:hyperlinks'

# --- [필수] 마우스 모드 ---
# Claude Code 는 CLAUDE_CODE_DISABLE_MOUSE=1 로 마우스 캡처 포기 (~/.zshrc).
# 이 덕분에 tmux 기본 마우스 바인딩이 Claude Code 팬에서도 작동 → 더블클릭 단어
# 선택, 네이티브 copy-on-select 모두 정상. URL 클릭은 Shift+Cmd+Click.
set -g mouse on

# --- [우리 추가] 마우스 copy 를 pbcopy 로 직결 ---
# tmux 기본 바인딩 + copy-pipe 대상만 pbcopy 로 교체. mouse_any_flag 분기는 다른
# TUI(vim/htop 등) 마우스 캡처 호환을 위해 유지.
bind -n DoubleClick1Pane select-pane -t= \; if -F '#{mouse_any_flag}' 'send-keys -M' 'if -Ft= "#{pane_in_mode}" "copy-mode -M" "copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear \"/usr/bin/pbcopy\""'
bind -n TripleClick1Pane select-pane -t= \; if -F '#{mouse_any_flag}' 'send-keys -M' 'if -Ft= "#{pane_in_mode}" "copy-mode -M" "copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear \"/usr/bin/pbcopy\""'

# --- [우리 추가] 선택 영역 가시성 (Catppuccin peach) ---
setw -g mode-style 'bg=#fab387,fg=#1e1e2e,bold'

# --- [우리 추가] copy-mode-vi Escape 한 번으로 종료 + pbcopy 연동 ---
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "/usr/bin/pbcopy"
