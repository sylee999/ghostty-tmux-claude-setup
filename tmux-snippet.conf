# ==============================================================================
# Ghostty + tmux + Claude Code 호환성 설정 스니펫
# 기존 ~/.tmux.conf 에 append 하여 사용.
# ==============================================================================

# --- [필수] Claude Code 공식 권장 ---
# Shift+Enter 줄바꿈, extended keys 전달
set -s extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'
# Ghostty 알림 / 프로그레스바가 tmux 바깥으로 나가게 함
set -g allow-passthrough on
# OSC 8 하이퍼링크 통과 (tmux가 Ghostty로 전달)
set -as terminal-features ',xterm-ghostty:hyperlinks'

# --- [필수] 마우스 모드 ---
# mouse on 상태에서 URL/OSC 8 링크 클릭은 Shift+Cmd+Click 으로 (Shift 가 tmux 캡처 우회).
set -g mouse on

# --- [우리 추가] TUI 앱(Claude Code 등)에서도 드래그 선택 + 더블/트리플 클릭 복사 ---
# 기본 바인딩은 mouse_any_flag 로 앱에게 위임하지만 Claude Code 가 마우스를 잡으면
# tmux copy-mode 진입이 안 됨. pane_in_mode 만 체크하도록 override.
bind -n MouseDrag1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -M'
bind -n DoubleClick1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'select-pane -t = ; copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear "/usr/bin/pbcopy"'
bind -n TripleClick1Pane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'select-pane -t = ; copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear "/usr/bin/pbcopy"'

# --- [우리 추가] 선택 영역 가시성 (Catppuccin peach) ---
setw -g mode-style 'bg=#fab387,fg=#1e1e2e,bold'

# --- [우리 추가] copy-mode-vi 에서 Escape 한 번으로 완전 종료 ---
# 기본값: Escape = clear-selection (copy-mode 유지). 커서가 프롬프트로 돌아가지 않음.
bind-key -T copy-mode-vi Escape send-keys -X cancel

# --- [우리 추가] 드래그 / y / Enter 복사 시 시스템 클립보드(pbcopy) 연동 ---
# pbcopy 를 절대 경로로 지정 (tmux 컨텍스트에서 PATH 해석 이슈 회피)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "/usr/bin/pbcopy"
